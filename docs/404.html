<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Off the radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --void:   #0A0E1A;
    --void-2: #0D1426;
    --grid:   rgba(120, 160, 220, 0.06);
    --ring:   rgba(94, 224, 208, 0.16);
    --ring-2: rgba(94, 224, 208, 0.28);
    --signal: #5EE0D0;
    --home:   #FF8A5B;
    --ink:    #E6ECF7;
    --muted:  #7C89A6;

    --display: "Space Grotesk", system-ui, sans-serif;
    --mono:    "IBM Plex Mono", ui-monospace, monospace;
    --body:    "Inter", system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    color: var(--ink);
    font-family: var(--body);
    background:
      radial-gradient(circle at 50% 38%, var(--void-2) 0%, var(--void) 62%),
      linear-gradient(var(--grid) 1px, transparent 1px) 0 0 / 44px 44px,
      linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0 / 44px 44px,
      var(--void);
    overflow: hidden;
  }

  .panel {
    width: 100%;
    max-width: 460px;
    text-align: center;
  }

  /* ---- Radar ---- */
  .radar {
    position: relative;
    width: 260px;
    height: 260px;
    margin: 0 auto 2.6rem;
    border-radius: 50%;
  }

  .radar .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid var(--ring);
  }
  .radar .ring.r2 { inset: 22%; }
  .radar .ring.r3 { inset: 44%; border-color: var(--ring-2); }

  /* crosshair */
  .radar .cross {
    position: absolute;
    background: var(--ring);
  }
  .radar .cross.h { left: 0; right: 0; top: 50%; height: 1px; }
  .radar .cross.v { top: 0; bottom: 0; left: 50%; width: 1px; }

  /* rotating sweep */
  .radar .sweep {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      rgba(94, 224, 208, 0) 0deg,
      rgba(94, 224, 208, 0) 300deg,
      rgba(94, 224, 208, 0.10) 340deg,
      rgba(94, 224, 208, 0.42) 360deg
    );
    animation: spin 4s linear infinite;
  }

  /* blips that never resolve */
  .blip {
    position: absolute;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--signal);
    opacity: 0;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px 2px rgba(94, 224, 208, 0.6);
  }
  .blip.b1 { top: 32%; left: 64%; animation: ping 4s linear infinite; }
  .blip.b2 { top: 70%; left: 40%; animation: ping 4s linear infinite 1.4s; }

  .code {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--display);
    font-weight: 700;
    font-size: 4.6rem;
    letter-spacing: 0.04em;
    color: var(--ink);
    text-shadow: 0 0 30px rgba(94, 224, 208, 0.25);
  }

  /* ---- Readout ---- */
  .status {
    font-family: var(--mono);
    font-size: 0.74rem;
    letter-spacing: 0.18em;
    color: var(--signal);
    margin-bottom: 1.5rem;
  }
  .status .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--signal);
    margin-right: 0.5em;
    vertical-align: middle;
    animation: blink 1.6s steps(1) infinite;
  }
  .status .coords { color: var(--muted); }

  h1 {
    font-family: var(--display);
    font-weight: 500;
    font-size: 1.7rem;
    line-height: 1.2;
    margin: 0 0 0.85rem;
  }

  p {
    font-size: 0.98rem;
    line-height: 1.6;
    color: var(--muted);
    margin: 0 auto 2rem;
    max-width: 34ch;
  }

  .home {
    display: inline-flex;
    align-items: center;
    gap: 0.55em;
    font-family: var(--mono);
    font-size: 0.86rem;
    letter-spacing: 0.06em;
    text-decoration: none;
    color: var(--void);
    background: var(--home);
    padding: 0.78em 1.5em;
    border-radius: 100px;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .home:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255, 138, 91, 0.32); }
  .home:focus-visible { outline: 2px solid var(--home); outline-offset: 3px; }
  .home .arrow { transition: transform 0.18s ease; }
  .home:hover .arrow { transform: translateX(-3px); }

  @keyframes spin   { to { transform: rotate(360deg); } }
  @keyframes ping   { 0%, 84% { opacity: 0; } 90% { opacity: 1; } 100% { opacity: 0; } }
  @keyframes blink  { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.25; } }

  @media (max-width: 380px) {
    .radar { width: 210px; height: 210px; }
    .code { font-size: 3.7rem; }
    h1 { font-size: 1.45rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .sweep { animation: none; background: conic-gradient(from 300deg, rgba(94,224,208,0) 0deg, rgba(94,224,208,0.28) 60deg, rgba(94,224,208,0) 60deg); }
    .blip { opacity: 0.85; animation: none; }
    .status .dot { animation: none; }
  }
</style>
</head>
<body>
  <main class="panel">
    <div class="radar" aria-hidden="true">
      <span class="sweep"></span>
      <span class="ring r1"></span>
      <span class="ring r2"></span>
      <span class="ring r3"></span>
      <span class="cross h"></span>
      <span class="cross v"></span>
      <span class="blip b1"></span>
      <span class="blip b2"></span>
      <span class="code">404</span>
    </div>

    <div class="status">
      <span class="dot"></span>NO SIGNAL <span class="coords">/ ── ── ──</span>
    </div>

    <h1>This page is off the radar.</h1>
    <p>The link may be broken, or the page may have moved. Let's get you back to solid ground.</p>

    <a class="home" href="/">
      <span class="arrow">←</span> Back to home
    </a>
  </main>
</body>
</html>
